<div class="centered-content">
    <div class="white-box">
        <div class="field">

            <h1 class="title has-text-red">Login</h1>
            <p class="control has-icons-left has-icons-right">
              <input  #emailInput class="input has-background-light" type="email" placeholder="Email">
              <span class="icon is-small is-left">
                <i class="fas fa-envelope"></i>
              </span>
              <span class="icon is-small is-right">
                <i class="fas fa-check"></i>
              </span>
            </p>
          </div>
          <div class="field">
            <p class="control has-icons-left">
              <input #passInput class="input has-background-light" type="password" placeholder="Password">
              <span class="icon is-small is-left">
                <i class="fas fa-lock"></i>
              </span>
            </p>
          </div>
          <div style="display: flex; justify-content: flex-end;">
            <p class="control">
              <button class="button is-success" (click)="LoginButtonClicked(emailInput.value, passInput.value)" >
                Login
              </button>
            </p>
          </div>

          <br>

          <p>Dont have an account? <a routerLink="/signup">Sign up </a> now!</p>



    </div>
</div>
